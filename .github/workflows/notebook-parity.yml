name: Notebook Parity

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  parity:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      JAX_PLATFORMS: cpu
      MPLCONFIGDIR: /tmp/matplotlib
      TF_CPP_MIN_LOG_LEVEL: "2"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Cache MNIST
        uses: actions/cache@v4
        with:
          path: ~/.keras/datasets
          key: mnist-keras-cache-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tfds,experiments]"

      - name: Run notebook parity regression
        run: |
          python examples/notebook_parity_regression.py
