name: Tests

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpu-smoke:
    # CPU-only smoke test that backs the "doesn't break older platforms"
    # claim. Matrix covers the floor (3.10) and ceiling (3.13) of the
    # supported range so marker-driven behavior changes on either end
    # are caught. The GitHub runner has no NVIDIA driver, so `setup.py`'s
    # CUDA detection returns None and `[all]` resolves to CPU-only.
    name: CPU smoke (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install (CPU-only via [all]; exercises dynamic-extras hook)
        # Use `[all]` rather than the smaller `[dev,experiments,viz]`
        # so `setup.py`'s `_build_all_extra()` is exercised end-to-end:
        # the runner has no nvidia-smi, so detection returns None and
        # `[all]` cleanly resolves to the non-CUDA bundle. This is the
        # CPU-only happy path users land on for laptop installs.
        run: pip install -e ".[all]"

      - name: Show resolved environment
        run: |
          python --version
          pip list

      - name: Run test suite
        run: pytest -q --no-header
