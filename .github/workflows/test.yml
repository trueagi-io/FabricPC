name: Tests

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpu-smoke:
    # CPU-only smoke test that backs the "doesn't break older platforms"
    # claim. Runs on Python 3.12 with the CPU-only extras subset; the
    # GitHub runner has no NVIDIA driver, so `setup.py`'s CUDA detection
    # returns None and `[all]` (if requested) would stay CPU-only. To
    # broaden coverage, add a `python-version` matrix below.
    name: CPU smoke (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install (CPU-only extras)
        run: pip install -e ".[dev,experiments,viz]"

      - name: Show resolved environment
        run: |
          python --version
          pip list

      - name: Run test suite
        run: pytest -q --no-header
